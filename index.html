<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etimesgut Hizmet Mahalli Değerlendirme Anketi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1e1a;
    --bg2:#14302a;
    --card:#fbf7ee;
    --ink:#1d2b27;
    --muted:#5e6f6a;
    --accent:#2f7d62;
    --accent-soft:#e3efe8;
    --gold:#c79a3d;
    --line:#e2dccd;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Mulish',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #1c4639 0%, transparent 60%),
      linear-gradient(160deg,var(--bg) 0%, var(--bg2) 100%);
    min-height:100vh;
    padding:32px 16px 64px;
    line-height:1.55;
  }
  .wrap{max-width:680px;margin:0 auto}
  .header{
    text-align:center;
    color:#f3ede0;
    margin-bottom:28px;
  }
  .header .crest{
    font-size:34px;letter-spacing:.05em;
    color:var(--gold);
    margin-bottom:6px;
  }
  .header .year{
    display:inline-block;
    font-family:'Mulish';font-weight:700;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);
    border:1px solid rgba(199,154,61,.45);
    border-radius:999px;
    padding:5px 14px;margin-bottom:16px;
  }
  .header h1{
    font-family:'Fraunces',serif;
    font-weight:600;font-size:clamp(24px,5vw,34px);
    line-height:1.15;
  }
  .header p{color:#aebcb6;margin-top:10px;font-size:15px}

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:clamp(20px,4vw,34px);
    box-shadow:0 24px 60px -20px rgba(0,0,0,.55);
  }

  .q{padding:22px 0;border-bottom:1px solid var(--line)}
  .q:first-of-type{padding-top:4px}
  .q-num{
    font-family:'Fraunces',serif;font-style:italic;
    color:var(--accent);font-weight:600;font-size:14px;
    margin-right:6px;
  }
  .q-text{font-weight:600;font-size:16px;margin-bottom:14px;display:block}
  .q-note{
    display:block;font-weight:400;font-size:13px;color:var(--muted);
    margin-top:5px;font-style:italic;
  }
  .req{color:#b9442f}

  /* Likert - 3 seçenek */
  .likert{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .likert label{
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:8px;
    border:1px solid var(--line);border-radius:14px;
    padding:12px 6px;cursor:pointer;
    background:#fff;
    transition:all .15s ease;
    text-align:center;min-height:84px;
  }
  .likert input{position:absolute;opacity:0;pointer-events:none}
  .likert .dot{
    width:22px;height:22px;border-radius:50%;
    border:2px solid #c2ccc7;flex:none;
    transition:all .15s ease;
  }
  .likert .lab{font-size:13px;color:var(--muted);font-weight:600;line-height:1.25}
  .likert label:hover{border-color:var(--accent);background:var(--accent-soft)}
  .likert input:checked + .dot{
    border-color:var(--accent);
    background:var(--accent);
    box-shadow:inset 0 0 0 4px #fff;
  }
  .likert label:has(input:checked){
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .likert label:has(input:checked) .lab{color:var(--accent)}

  /* text inputs */
  textarea{
    width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;background:#fff;
    transition:border-color .15s;
  }
  textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:110px;resize:vertical}

  .submit{
    width:100%;margin-top:26px;
    font-family:'Mulish';font-weight:700;font-size:16px;letter-spacing:.02em;
    color:#fff;background:var(--accent);
    border:none;border-radius:14px;padding:16px;cursor:pointer;
    transition:transform .12s, background .2s;
  }
  .submit:hover{background:#266750}
  .submit:active{transform:scale(.99)}
  .submit:disabled{opacity:.6;cursor:not-allowed}

  .thanks{
    display:none;text-align:center;padding:40px 10px;
  }
  .thanks .check{
    width:64px;height:64px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;margin:0 auto 18px;
  }
  .thanks h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-bottom:10px}
  .thanks p{color:var(--muted)}

  .foot{text-align:center;color:#8b9a94;font-size:12px;margin-top:22px}

  @media(max-width:480px){
    .likert{grid-template-columns:repeat(3,1fr);gap:5px}
    .likert label{padding:10px 3px;min-height:90px}
    .likert .lab{font-size:12px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="year">Değerlendirme Anketi</span>
    <h1>Etimesgut Hizmet Mahalli Değerlendirme Anketi</h1>
    <p>Görüşleriniz hizmetlerimizi geliştirmemiz için çok değerli.</p>
  </div>

  <div class="card">
    <form id="surveyForm">
      <div id="questions"></div>

      <div class="q" style="border-bottom:none">
        <label class="q-text"><span class="q-num">8.</span>Kurban hizmetinin bir sonraki sene daha iyi olabilmesi adına yapılabilecek çalışmalar ile alakalı dilek ve temennileriniz nelerdir?</label>
        <textarea name="soru8" placeholder="Dilek ve temennileriniz..."></textarea>
      </div>

      <button type="submit" class="submit" id="submitBtn">Anketi Gönder</button>
    </form>

    <div class="thanks" id="thanks">
      <div class="check">✓</div>
      <h2>Teşekkür ederiz</h2>
      <p>Vakit ayırarak anketimizi doldurduğunuz için teşekkür ederiz.</p>
      <button type="button" class="submit" id="againBtn" style="max-width:280px;margin:24px auto 0">Yeni Anket Doldur</button>
    </div>
  </div>

  <div class="foot">Etimesgut Hizmet Mahalli Değerlendirme Anketi</div>
</div>

<script>
  // ⬇️ Apps Script web app URL'sini buraya yapıştır
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3ZROQa8DL7A-UTrhNT9F1lQpEjNVKcIFi9qd6hSRHsqilbWxDjBCPLUi3rxS4HfzdxQ/exec";

  const likertQuestions = [
    { text: "Bayram günü Bayram namazı ve vakit namazlarını rahatlıkla eda edebildiniz mi?" },
    { text: "Kurban günü yapacağınız vazife size önceden bildirildi ve tarif edildi mi?" },
    { text: "Vazife aldığınız mahalde ekipmanlar yeterli ve yedekleri mevcut muydu?" },
    { text: "Vazife aldığınız mahalde ekip sayısı yeterli miydi?" },
    { text: "Vazife aldığınız mahale uygun hijyen tedbirleri alınmış mıydı?", note: "Hijyen Tedbirleri: Bone, eldiven, önlük, gözlük, çizme vb" },
    { text: "Kurban kesim mahallinde sosyal donatı alanı mevcut ve yeterli miydi?", note: "Sosyal Donatı Alanı: Mescit, ikram mahalli vb" },
    { text: "Kurban kesim mahallinde vazifelilere yapılan ikramlar uygun ve yeterli miydi?" }
  ];
  const scale = [
    "Evet",
    "Kısmen",
    "Hayır"
  ];

  const qContainer = document.getElementById('questions');
  likertQuestions.forEach((q, i) => {
    const name = "soru" + (i + 1);
    let opts = "";
    scale.forEach((s, j) => {
      opts += `<label>
        <input type="radio" name="${name}" value="${j + 1}" required>
        <span class="dot"></span>
        <span class="lab">${s}</span>
      </label>`;
    });
    const note = q.note ? `<span class="q-note">*${q.note}</span>` : "";
    qContainer.insertAdjacentHTML('beforeend', `
      <div class="q">
        <label class="q-text"><span class="q-num">${i + 1}.</span>${q.text} <span class="req">*</span>${note}</label>
        <div class="likert">${opts}</div>
      </div>`);
  });

  const form = document.getElementById('surveyForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Gönderiliyor...";
    const data = {};
    new FormData(form).forEach((v, k) => data[k] = v);
    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
      });
      form.style.display = "none";
      document.getElementById('thanks').style.display = "block";
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Anketi Gönder";
      alert("Gönderim sırasında bir hata oluştu. Lütfen tekrar deneyin.");
    }
  });

  document.getElementById('againBtn').addEventListener('click', () => {
    form.reset();
    form.style.display = "block";
    document.getElementById('thanks').style.display = "none";
    btn.disabled = false;
    btn.textContent = "Anketi Gönder";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
</body>
</html>
